org: nagashiva
app: my-app
service: sathiai-backend

provider:
  name: aws
  runtime: python3.11
  region: us-east-1
  environment:
    AWS_S3_BUCKET: sathiai-assets
    DYNAMO_PASSWORD_RESET_TABLE: SathiAI_PasswordResetTokens
    DYNAMO_ADDRESSES_TABLE: SathiAI_Addresses
    DYNAMO_SUPPORT_TABLE: SathiAI_SupportTickets
    DYNAMO_USERS_TABLE: SathiAI_Users
    DYNAMO_SCHEMES_TABLE: SathiAI_Schemes
    DYNAMO_OTPS_TABLE: SathiAI_OTPs
    AWS_BEDROCK_MODEL_ID: anthropic.claude-3-haiku-20240307-v1:0
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:BatchWriteItem
          Resource:
            - "arn:aws:dynamodb:${self:provider.region}:*:table/SathiAI_*"
        - Effect: Allow
          Action:
            - ses:SendEmail
            - ses:SendRawEmail
          Resource: "*"
        - Effect: Allow
          Action:
            - polly:SynthesizeSpeech
          Resource: "*"
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource: "*"
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: "*"
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource: "arn:aws:s3:::sathiai-assets/*"
        - Effect: Allow
          Action:
            - transcribe:StartTranscriptionJob
            - transcribe:GetTranscriptionJob
          Resource: "*"

functions:
  api:
    handler: src.main.handler
    layers:
      - { Ref: PythonRequirementsLambdaLayer }
    events:
      - httpApi: '*'

resources:
  Resources:
    PasswordResetTokensTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: SathiAI_PasswordResetTokens
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
          - AttributeName: token
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
          - AttributeName: token
            KeyType: RANGE
        TimeToLiveSpecification:
          AttributeName: expires_at
          Enabled: true
        BillingMode: PAY_PER_REQUEST

    AddressesTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: SathiAI_Addresses
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
          - AttributeName: id
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST

    SupportTicketsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: SathiAI_SupportTickets
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
          - AttributeName: id
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH
          - AttributeName: id
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST

custom:
  pythonRequirements:
    dockerizePip: true
    layer: true
    slim: true

plugins:
  - serverless-python-requirements

package:
  exclude:
    - node_modules/**
    - tests/**
    - scripts/**
    - .venv/**
    - __pycache__/**
